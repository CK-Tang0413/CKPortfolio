<svg id="svg-logo-_r_0_" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%" class="select-none w-full h-full max-w-full max-h-full drop-shadow-[0_25px_25px_rgba(0,0,0,0.4)]">
  <defs>
    <filter id="glow-_r_0_" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="grad-_r_0_" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="borderGrad-_r_0_" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="bgGrad-_r_0_" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B132B"/>
      <stop offset="100%" stop-color="#060B18"/>
    </linearGradient>
    <pattern id="pattern-grid-_r_0_" width="25" height="25" patternUnits="userSpaceOnUse">
      <rect width="25" height="25" fill="#090d16"/>
      <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.35"/>
    </pattern>
  </defs>
  
  <rect width="500" height="500" fill="url(#bgGrad-_r_0_)" rx="32" class="transition-all duration-300"/>
  
  <g>
    <circle cx="250" cy="250" r="150" fill="none" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="40 180 80 40 20 40" opacity="0.5" class="animate-[spin_40s_linear_infinite]" style="transform-origin: 250px 250px;"/>
    <circle cx="250" cy="250" r="135" fill="none" stroke="#38BDF8" stroke-width="1" stroke-dasharray="10 15 5 15" opacity="0.3" class="animate-[spin_25s_linear_infinite_reverse]" style="transform-origin: 250px 250px;"/>
    <circle cx="250" cy="100" r="3" fill="#3B82F6"/>
    <circle cx="250" cy="400" r="3" fill="#3B82F6"/>
  </g>
  
  <polygon points="250,65 410,157.5 410,342.5 250,435 90,342.5 90,157.5" stroke="url(#borderGrad-_r_0_)" stroke-width="3" fill="none" filter="url(#glow-_r_0_)" class="transition-all duration-300"/>
  
  <g transform="rotate(0, 250, 250) scale(1)" class="transition-all duration-300" style="transform-origin: 250px 250px;">
    <!-- Centered text exactly at x=250, y=250 -->
    <text x="250" y="250" dominant-baseline="central" text-anchor="middle" fill="url(#grad-_r_0_)" filter="url(#glow-_r_0_)" class="transition-all duration-300 select-none cursor-default" style="font-family: &quot;Space Grotesk&quot;, sans-serif; font-weight: 700; font-size: 85px; letter-spacing: 0.15em; text-transform: uppercase;">TANG</text>
  </g>
</svg>
